<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Snippet - Coder's Hub</title>
    <link rel="stylesheet" href="submit.css">
    <link rel="shortcut icon" href="ch.png" type="image/x-icon">
</head>
<body>

    <header class="container">
        <a href="index.html"><h1 class="logo">CODER'S HUB</h1></a>
        <span class="back" onclick="goBack()">Back</span>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>Submit Your Code Snippet</h2>
                <p>Help the community by sharing a useful piece of code.</p>
            </div>
        </section>

        <section class="submit-form-section container">
            <form id="snippet-form">
                <div class="form-group">
                    <label for="title">Snippet Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language" name="language" required>
                        <option value="">-Select Language-</option>
                        <option value="Java">Java</option>
                        <option value="C++">C++</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Python">Python</option>
                        <option value="MySQL">MySQL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="code">Code</label>
                    <textarea id="code" name="code" rows="10" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit Snippet</button>
            </form>
        </section>
    </main>


    <script src="script.js"></script>
</body>
</html>
